# Docker Compose for local development

services:
    rs8kvn_bot:
        build: .
        container_name: rs8kvn_bot_local
        restart: unless-stopped
        volumes:
            - ./.env:/app/.env:ro
            - ./data:/app/data
        environment:
            - TZ=Europe/Moscow
        healthcheck:
            test: ["CMD", "pgrep", "rs8kvn_bot"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
