# Docker Compose for local development
# Note: Create data directory first with: mkdir -p data && chmod 755 data

services:
    tgvpn_bot:
        build: .
        container_name: tgvpn_bot_local
        restart: unless-stopped
        volumes:
            - ./.env:/app/.env:ro
            - ./data:/app/data
        environment:
            - TZ=Europe/Moscow
