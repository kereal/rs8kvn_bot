services:
    rs8kvn_bot:
        image: ghcr.io/kereal/rs8kvn_bot:latest
        container_name: rs8kvn_bot
        restart: unless-stopped
        volumes:
            - ./.env:/app/.env:ro
            - ./data:/app/data
        environment:
            - TZ=Europe/Moscow
            # Go runtime optimizations for minimal memory
            - GOMEMLIMIT=67108864
            - GOGC=50
        healthcheck:
            test: ["CMD", "pgrep", "rs8kvn_bot"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        # Resource limits for minimal memory footprint
        deploy:
            resources:
                limits:
                    cpus: "0.5"
                    memory: 128M
                reservations:
                    cpus: "0.1"
                    memory: 6M
