version: "2"

run:
  timeout: 5m

issues:
  exclude-rules:
    # Test files in internal/ directory
    - path: internal/.+_test\.go$
      linters:
        - errcheck
        - gosec
        - contextcheck
        - errorlint
        - forbidigo
        - gocritic
        - staticcheck
        - tparallel
        - unused
    # Test files in cmd/ directory
    - path: cmd/.+_test\.go$
      linters:
        - errcheck
        - gosec
        - contextcheck
        - errorlint
        - forbidigo
        - gocritic
        - staticcheck
        - tparallel
        - unused
    # Test files in tests/ directory
    - path: tests/.+_test\.go$
      linters:
        - errcheck
        - gosec
        - contextcheck
        - errorlint
        - forbidigo
        - gocritic
        - staticcheck
        - tparallel
        - unused
    # Test files: gosec patterns that are acceptable in tests
    - path: .+_test\.go$
      linters:
        - gosec
      text: "G302"
    - path: .+_test\.go$
      linters:
        - gosec
      text: "G304"
    - path: .+_test\.go$
      linters:
        - gosec
      text: "G306"
    - path: .+_test\.go$
      linters:
        - gosec
      text: "G107"
    - path: .+_test\.go$
      linters:
        - gosec
      text: "G115"
    - path: .+_test\.go$
      linters:
        - gosec
      text: "G204"
    # cmd/bot/main.go: gosec G404 for math/rand jitter
    - path: cmd/bot/main\.go
      linters:
        - gosec
      text: "G404"
    # internal/xui/client.go: gosec G404 for math/rand jitter
    - path: internal/xui/client\.go
      linters:
        - gosec
      text: "G404"
    # internal/flag/flag.go: inamedparam - interface from standard flag package
    - path: internal/flag/flag\.go
      linters:
        - inamedparam

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gocognit
    - gochecknoinits
    - goconst
    - gocyclo
    - godot
    - godox
    - ireturn
    - lll
    - maintidx
    - mnd
    - nestif
    - nlreturn
    - noctx
    - paralleltest
    - predeclared
    - tagliatelle
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
    - cyclop
    - dupl
    - err113
    - funcorder
    - gosmopolitan
    - nonamedreturns
    - perfsprint
    - prealloc
    - recvcheck
    - revive
    - intrange
    - nilnil
    - exhaustive
    - testifylint
    - thelper
    - unparam
    - usetesting
    - containedctx
    - interfacebloat
    - nolintlint
    - usestdlibvars
