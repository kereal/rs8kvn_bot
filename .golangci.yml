# golangci-lint configuration
# Compatible with both v1 and v2

run:
    timeout: 5m

linters:
    enable:
        - errcheck
        - govet
        - staticcheck
        - unused
        - misspell
        - unconvert
        - unparam
        - gosec
    disable:
        - ineffassign

issues:
    exclude-files:
        - _test\.go
    exclude-rules:
        - path: _test\.go
          linters:
              - all
        - text: "ctx is unused"
          linters:
              - unparam
        - text: "sendWithRetry"
          linters:
              - unused

linters-settings:
    errcheck:
        check-type-assertions: true
        exclude-functions:
            - sync.Pool.Get
            - "sync.(*Pool).Get"
    gosec:
        excludes:
            - G104
            - G304
            - G306

formatters:
    enable:
        - gofmt
        - goimports
