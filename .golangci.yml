version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gosec
  disable:
    - ineffassign
  settings:
    errcheck:
      check-type-assertions: true
    gosec:
      excludes:
        - G104
        - G304
        - G306

formatters:
  enable:
    - gofmt
    - goimports
