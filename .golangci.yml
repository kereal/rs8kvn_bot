version: "2"

run:
    timeout: 5m

linters:
    enable:
        - errcheck
        - govet
        - staticcheck
        - unused
        - misspell
        - unconvert
        - unparam
        - gosec
    disable:
        - ineffassign
    exclusions:
        paths:
            - '.*_test\.go'

formatters:
    enable:
        - gofmt
        - goimports
