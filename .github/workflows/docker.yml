name: CI/CD Pipeline

on:
    push:
        branches:
            - main
        tags:
            - "v*"

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    lint:
        name: Lint Code
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.25"
                  cache: true

            - name: Download dependencies
              run: go mod download

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v8
              with:
                  version: latest

            - name: Run gosec
              uses: securego/gosec@master
              with:
                  args: -no-fail -quiet ./...

    test:
        name: Run Tests
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.25"
                  cache: true

            - name: Download dependencies
              run: go mod download

            - name: Run tests
              run: go test -v -race -coverprofile=coverage.out ./...

            - name: Upload coverage
              uses: actions/upload-artifact@v6
              with:
                  name: coverage
                  path: coverage.out
                  retention-days: 7

    build-and-push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        needs: test
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix=

            - name: Get version
              id: get_version
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Get build time
              id: get_build_time
              run: echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64
                  build-args: |
                      VERSION=${{ steps.get_version.outputs.VERSION }}
                      COMMIT_SHA=${{ github.sha }}
                      BUILD_TIME=${{ steps.get_build_time.outputs.BUILD_TIME }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: [test, build-and-push]
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Get version from tag
              id: get_version
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Generate changelog
              id: changelog
              run: |
                  # Get previous tag
                  PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

                  if [ -z "$PREV_TAG" ]; then
                      # First release, get all commits
                      CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
                  else
                      # Get commits since last tag
                      CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
                  fi

                  # Save changelog to file for multiline support
                  echo "$CHANGELOG" > /tmp/changelog.txt
                  echo "changelog_file=/tmp/changelog.txt" >> $GITHUB_OUTPUT

            - name: Create Release
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ steps.get_version.outputs.VERSION }}
                  name: Release ${{ steps.get_version.outputs.VERSION }}
                  bodyFile: ${{ steps.changelog.outputs.changelog_file }}
                  generateReleaseNotes: true
                  draft: false
                  prerelease: false
                  token: ${{ secrets.GITHUB_TOKEN }}
